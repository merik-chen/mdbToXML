name: Release

on:
  pull_request:
    branches: [release]
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release plugins
        run: npm install --no-save semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec @semantic-release/github

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
        continue-on-error: true

      - name: Get version from latest tag
        id: version
        run: |
          $tag = git describe --tags --abbrev=0 2>$null
          if ($tag -and $tag -match '^v?(.+)$') {
            $ver = $Matches[1]
            echo "new_version=$ver" >> $env:GITHUB_OUTPUT
            echo "has_release=true" >> $env:GITHUB_OUTPUT
            echo "Detected version: $ver"
          } else {
            echo "has_release=false" >> $env:GITHUB_OUTPUT
            echo "No new version detected"
          }

      - name: Publish executable
        if: steps.version.outputs.has_release == 'true'
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.new_version }} `
            -o ./publish

      - name: Upload to GitHub Releases
        if: steps.version.outputs.has_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: "v${{ steps.version.outputs.new_version }}"
          prerelease: false
          generate_release_notes: true
          files: ./publish/mdbToXML.exe
